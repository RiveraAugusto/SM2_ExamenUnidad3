version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: red_colaborativa_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "RedColab_DB_Pass_2026!XyZ"
      POSTGRES_DB: mentoria_academica
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    # Healthcheck: la API no arrancará hasta que postgres esté listo para recibir conexiones
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mentoria_academica"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    container_name: red_colaborativa_api
    restart: always
    ports:
      - "8300:8000"
    env_file:
      - .env
    # Solo arranca cuando la BD pase el healthcheck (no solo "started")
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
