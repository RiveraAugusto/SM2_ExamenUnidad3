name: Mobile Build & Release (Android APK)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
  pull_request:
    branches:
      - main
    paths:
      - "mobile/**"

jobs:
  validate:
    name: Validate JS & Dependencies
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for broken imports (expo doctor)
        run: npx expo-doctor || true

  build-and-release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Authenticate with Expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Build Android APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --local \
            --output ./build/app-release.apk

      - name: Generate release tag and notes
        id: release_meta
        run: |
          DATE=$(date +'%Y-%m-%d')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=v${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=RCE UPT - v${DATE}" >> $GITHUB_OUTPUT
          mv ./build/app-release.apk ./build/RCE_UPT.apk

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: |
            ## 📱 Red Colaborativa Estudiantil
            **Fecha:** ${{ steps.release_meta.outputs.tag }}
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Cambios incluidos
            ${{ github.event.head_commit.message }}

            ---
            > Descarga el archivo `RCE_UPT.apk` y ábrelo en tu Android para instalar la app.
          files: mobile/build/RCE_UPT.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
