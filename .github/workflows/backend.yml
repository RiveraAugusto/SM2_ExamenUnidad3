name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  validate:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8 linter
        run: |
          flake8 . \
            --count \
            --max-line-length=120 \
            --exclude=.git,__pycache__,alembic,migrations \
            --statistics

      - name: Verify app can be imported
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          GEMINI_API_KEY: ""
          FIREBASE_CREDENTIALS_PATH: ""
          GOOGLE_SERVICE_ACCOUNT_JSON: ""
          FIREBASE_STORAGE_BUCKET: ""
        run: python -c "import main; print('✅ App imports OK')"
        continue-on-error: true

      - name: Notify success on main
        if: github.ref == 'refs/heads/main' && success()
        run: echo "✅ Backend validado. Dokploy desplegará automáticamente desde main."
