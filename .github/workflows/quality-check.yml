name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8 linter
        run: |
          flake8 . \
            --count \
            --max-line-length=120 \
            --exclude=.git,__pycache__,alembic,migrations,tests \
            --statistics
      - name: Run pytest
        run: pytest tests/ -v

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter (like flutter analyze)
        run: npm run lint
      - name: Run tests (like flutter test)
        run: npm test
